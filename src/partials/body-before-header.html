<style>
        .popup{ position: fixed;top: 0;left: 0;width: 100%;height: 100%;background: rgba(0, 0, 0, 0.9);display: flex;align-items: center;justify-content: center;z-index: 9999;
                opacity: 0;visibility: hidden;transition: all 0.3s ease;}
        .popup .containaa{width:60%;margin:100px auto;}
        #down-btn{margin-top:30px;width:40%}
        #close-btn{cursor:pointer;}
    </style>
    <div class="popup">
        <div id="is_submit">0</div>
        <div class="containaa">
                    </div>
        
    </div>
    <script>
        
        jQuery(document).ready(function($){
            var down=function(url,name){
                if(!url){
                    return false;
                }
                name=name.replaceAll('.','');
                var a = document.createElement("a");
                a.download = name;
                a.target = "_blank";
                a.href = url;
                $("body").append(a); // 修复firefox中无法触发click
                a.click();
                $(a).remove();
            }
            var is_submit = $('#is_submit').html();
            
            
            $('.yes-submit-form').click(function(){
                if(is_submit==1){
                    var file=$(this).attr('data-file');
                    var name = $(this).attr('data-name');
                    down(file,name);
                }else{
                    $('body').css({'overflow':'hidden'});
                    $('.popup').css({'opacity':1,'visibility':'visible'});
                }    
                
            })
            
            $('#close-btn').click(function(){
                $('body').css({'overflow':'auto'});
                $('.popup').css({'opacity':0,'visibility':'hidden'});
            })
            
            
        })
    </script>
